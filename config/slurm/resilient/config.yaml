# config/slurm/resilient/config.yaml
#
# Use this profile on busy or flaky Slurm clusters where finishing most samples
# is more important than maximizing raw throughput in any single submission.
# It keeps Snakemake moving past independent failures, retries transient job
# hiccups, and limits grouped batch blast radius to 4 samples instead of 32.
#
# Usage: snakemake --profile config/slurm/resilient ...

executor: slurm

jobs: 100
cores: 1024

conda-frontend: conda
use-conda: true
keep-incomplete: true
keep-going: true
rerun-incomplete: true
restart-times: 2
latency-wait: 60
show-failed-logs: true

default-resources:
  slurm_account: "nrsaamr"
  slurm_partition: "'ord'"
  mem_mb: 4000
  runtime: 8640

groups:
  coverage: "coverage"
  mobsuite: "mobsuite"
  amrfinderplus: "amrfinderplus"
  resfinder: "resfinder"
  mef: "mobilelementfinder"
  checkm2: "checkm2"
  txsscan: "txsscan"
  ectyper: "ectyper"
  seqsero: "seqsero"
  sistr: "sistr"

group-components:
  coverage: 4
  mobsuite: 4
  amrfinderplus: 4
  resfinder: 4
  mobilelementfinder: 4
  checkm2: 4
  txsscan: 4
  ectyper: 4
  seqsero: 4
  sistr: 4

set-threads:
  fastp: 1
  unicylcer: 32
  coverage: 1
  mash_classify: 4
  mobsuite: 1
  amrfinderplus: 1
  resfinder: 1
  mef: 1
  checkm2: 1
  txsscan: 1
  ectyper: 1
  seqsero: 4
  sistr: 4
  mlst: 1

set-resources:
  fastp:
    mem_mb: 10000
    runtime: 60
  unicylcer:
    mem_mb: 150000          # also forwarded to SPAdes as an explicit -m cap
    runtime: 8640
  coverage:
    mem_mb: 4000
    runtime: 60
  mash_classify:
    mem_mb: 20000
    runtime: 60
  mobsuite:
    mem_mb: 2000
    runtime: 600
  amrfinderplus:
    mem_mb: 2000
    runtime: 600
  resfinder:
    mem_mb: 4000
    runtime: 600
  mef:
    mem_mb: 2000
    runtime: 600
  checkm2:
    mem_mb: 4000
    runtime: 720
  txsscan:
    mem_mb: 2000
    runtime: 600
  ectyper:
    mem_mb: 5000
    runtime: 600
  seqsero:
    mem_mb: 4000
    runtime: 120
  sistr:
    mem_mb: 4000
    runtime: 120
  mlst:
    mem_mb: 4000
    runtime: 120
