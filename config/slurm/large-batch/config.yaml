# config/slurm/large-batch/config.yaml
#
# Use this profile for runs with ≥50 samples.
# Sample-parallel rules are batched into group jobs of 32 samples each.
# Resources are sized per-sample; Slurm receives the sum across all samples
# in a batch job (e.g. 32 samples × 2000 MB = 64 GB for one mobsuite job).
#
# Usage: snakemake --profile config/slurm/large-batch ...

# ----------------------------
#  Global Slurm limits
# ----------------------------

executor: slurm

jobs: 100                    # Max simultaneous jobs submitted to Slurm
cores: 1024                  # Max total CPUs across all jobs

conda-frontend: conda
use-conda: true
keep-incomplete: true        # Preserve partial output to avoid re-computation

# ----------------------------------------------------
#  Default resources (applied when not set explicitly)
# ----------------------------------------------------

default-resources:
  slurm_account: "nrsaamr"
  slurm_partition: "'ord'"
  mem_mb: 4000
  runtime: 8640

# -----------------------------------------------------------
#  Groups — batch multiple samples into a single Slurm job
# -----------------------------------------------------------

groups:
  coverage: "coverage"
  mobsuite: "mobsuite"
  amrfinderplus: "amrfinderplus"
  resfinder: "resfinder"
  mef: "mobilelementfinder"
  checkm2: "checkm2"
  txsscan: "txsscan"
  ectyper: "ectyper"
  seqsero: "seqsero"

# -----------------------------------------------------------
#  Batch size — number of samples per group job
#  Resources below are summed across all samples in a batch.
#  32 samples × 1 thread = 32 CPUs requested per batch job.
# -----------------------------------------------------------

group-components:
  coverage: 32
  mobsuite: 32
  amrfinderplus: 32
  resfinder: 32
  mobilelementfinder: 32
  checkm2: 32
  txsscan: 32
  ectyper: 32
  seqsero: 32

# -----------------------------------------------------------
#  Per-rule thread allocation
# -----------------------------------------------------------

set-threads:
  fastp: 1
  unicylcer: 32
  coverage: 1
  mash_classify: 4
  mobsuite: 1
  amrfinderplus: 1
  resfinder: 1
  mef: 1
  checkm2: 1
  txsscan: 1
  ectyper: 1
  seqsero: 1
  mlst: 1

# -----------------------------------------------------------
#  Per-rule resource allocation
#  mem_mb and runtime here are PER-SAMPLE.
#  Grouped rules: Slurm job total = value × group-components.
# -----------------------------------------------------------

set-resources:
  # --- Assembly (not grouped — always one job per sample) ---
  fastp:
    mem_mb: 10000
    runtime: 60
  unicylcer:
    mem_mb: 150000
    runtime: 8640
  coverage:
    mem_mb: 4000             # × 32 = 128 GB per batch job
    runtime: 60

  # --- Taxonomy ---
  mash_classify:
    mem_mb: 20000            # not grouped; one job per sample
    runtime: 60

  # --- Annotation (grouped) ---
  mobsuite:
    mem_mb: 2000             # × 32 = 64 GB
    runtime: 600
  amrfinderplus:
    mem_mb: 2000             # × 32 = 64 GB
    runtime: 600
  resfinder:
    mem_mb: 4000             # × 32 = 128 GB
    runtime: 600
  mef:
    mem_mb: 2000             # × 32 = 64 GB
    runtime: 600

  # --- QC (grouped) ---
  checkm2:
    mem_mb: 4000             # × 32 = 128 GB
    runtime: 720

  # --- Serotyping (grouped) ---
  txsscan:
    mem_mb: 2000             # × 32 = 64 GB
    runtime: 600
  ectyper:
    mem_mb: 5000             # × 32 = 160 GB
    runtime: 600
  seqsero:
    mem_mb: 2000             # × 32 = 64 GB
    runtime: 120

  # --- Aggregate (not grouped — runs once across all samples) ---
  mlst:
    mem_mb: 4000
    runtime: 120
