# config/slurm/config.yaml

# ----------------------------
#  Set global slurm limits
# ----------------------------

executor: slurm

jobs: 100                   # Max number of simultaneous jobs submitted to slurm
cores: 32                   # Max number of CPUs per job/group
local-cores: 1              # Limit number of cores for local rules
conda-frontend: conda       # conda or mamba
use-conda: True             # Enable Conda integration
keep-incomplete: True       # Keep incomplete output to prevent re-computation


# ----------------------------------------------------
#   Set default resources (if not specified in rules)
# ----------------------------------------------------

default-resources:
  slurm_account: "nrsaamr"
  slurm_partition: "ord"
  mem_mb: 50000               
  cpus_per_task: 8            
  runtime: "6d"
  slurm_logdir: "/work/NRSAAMR/Projects/SWAM/SWAM-g_test/slurm"
 
# -----------------------------------------------------------
#  Assign rules to specific groups (run samples in batches)
# -----------------------------------------------------------

groups:
  mobsuite: "mobsuite"
  amrfinderplus: "amrfinderplus"
  resfinder: "resfinder"
  mef: "mef"
  seqsero: "seqsero"
  ectyper: "ectyper"
  txsscan: "txsscan"
  coverage: "coverage"

# -------------------------------------------------------------------------------------------
#  Set the number of connected DAG components a group can span (batch size of each group)
# -------------------------------------------------------------------------------------------

group-components:
  mobsuite: 100
  amrfinderplus: 100
  resfinder: 100
  mef: 100
  seqsero: 100
  ectyper: 100
  txsscan: 100
  coverage: 100

