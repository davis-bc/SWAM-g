# Default Slurm profile.
#
# This is the single supported HPC profile for SWAM-g. It keeps the resilient
# execution behavior that proved useful on busy clusters while keeping the
# submission surface simple for users.
#
# Walltimes are written as explicit Snakemake/Slurm-style time strings
# (for example 1h, 10h, 6d) instead of bare integers so they are not confused
# with seconds on clusters that interpret numeric values differently.

executor: slurm

jobs: 100
cores: 1024

conda-frontend: conda
use-conda: true
keep-incomplete: true
keep-going: true
rerun-incomplete: true
restart-times: 2
latency-wait: 60
show-failed-logs: true
quiet:
  - rules

default-resources:
  slurm_account: "nrsaamr"
  slurm_partition: "'ord'"
  mem_mb: 4000
  runtime: "6d"

groups:
  coverage: "coverage"
  mobsuite: "mobsuite"
  amrfinderplus: "amrfinderplus"
  resfinder: "resfinder"
  mef: "mobilelementfinder"
  checkm2: "checkm2"
  txsscan: "txsscan"
  ectyper: "ectyper"
  seqsero: "seqsero"
  sistr: "sistr"

# Grouped downstream rules are capped at 4 samples per job to reduce blast
# radius when a cluster node fails or a grouped step is underprovisioned.
group-components:
  coverage: 4
  mobsuite: 4
  amrfinderplus: 4
  resfinder: 4
  mobilelementfinder: 4
  checkm2: 4
  txsscan: 4
  ectyper: 4
  seqsero: 4
  sistr: 4

set-threads:
  fastp: 1
  unicylcer: 32
  coverage: 1
  mash_classify: 4
  mobsuite: 1
  amrfinderplus: 1
  resfinder: 1
  mef: 1
  checkm2: 1
  txsscan: 1
  ectyper: 1
  seqsero: 4
  sistr: 4
  mlst: 1

set-resources:
  fastp:
    mem_mb: 10000
    runtime: "1h"
  coverage:
    mem_mb: 4000
    runtime: "1h"
  mash_classify:
    mem_mb: 20000
    runtime: "1h"
  mobsuite:
    mem_mb: 2000
    runtime: "10h"
  amrfinderplus:
    mem_mb: 2000
    runtime: "10h"
  resfinder:
    mem_mb: 4000
    runtime: "10h"
  mef:
    mem_mb: 2000
    runtime: "10h"
  checkm2:
    mem_mb: 4000
    runtime: "12h"
  txsscan:
    mem_mb: 2000
    runtime: "10h"
  ectyper:
    mem_mb: 5000
    runtime: "10h"
  seqsero:
    mem_mb: 4000
    runtime: "2h"
  sistr:
    mem_mb: 4000
    runtime: "2h"
  mlst:
    mem_mb: 4000
    runtime: "2h"
