# Default Slurm profile.
#
#  This is the single supported HPC profile for SWAM-g. Per-rule resources
#  below were retuned from benchmark measurements.
#  Explicit walltime strings are used so clusters do
#  not disagree about whether bare numeric runtimes mean minutes or seconds.

executor: slurm

jobs: 100
cores: 1024

conda-frontend: conda
use-conda: true
keep-incomplete: true
keep-going: true
rerun-incomplete: true
restart-times: 2
latency-wait: 60
show-failed-logs: true
quiet:
  - rules

default-resources:
  slurm_account: ""
  slurm_partition: ""
  mem_mb: 2000
  runtime: "2h"

# group: "rule"
groups:
  fastp: "fastp"
  coverage: "coverage"
  mobsuite: "mobsuite"
  amrfinderplus: "amrfinderplus"
  resfinder: "resfinder"
  mef: "mobilelementfinder"
  checkm2: "checkm2"
  txsscan: "txsscan"
  ectyper: "ectyper"
  seqsero: "seqsero"
  sistr: "sistr"

# group: n samples per group 
group-components:
  fastp: 4
  coverage: 4
  mobsuite: 4
  amrfinderplus: 4
  resfinder: 4
  mobilelementfinder: 4
  checkm2: 4
  txsscan: 4
  ectyper: 4
  seqsero: 4
  sistr: 4

# Note. Resources for grouped rules are summed
# 1 thread x 4 samples/group = 4 threads in group job
set-threads:
  fastp: 1
  unicylcer: 32
  coverage: 1
  mash_classify: 4
  mobsuite: 1
  amrfinderplus: 1
  resfinder: 1
  mef: 1
  checkm2: 32
  txsscan: 1
  ectyper: 1
  seqsero: 1
  sistr: 1
  mlst: 1

set-resources:
  fastp:
    mem_mb: 4000
    runtime: "30m"
  coverage:
    mem_mb: 2000
    runtime: "30m"
  mash_classify:
    mem_mb: 24000
    runtime: "30m"
  mobsuite:
    mem_mb: 2000
    runtime: "1h"
  amrfinderplus:
    mem_mb: 1000
    runtime: "30m"
  resfinder:
    mem_mb: 1000
    runtime: "30m"
  mef:
    mem_mb: 1000
    runtime: "30m"
  checkm2:
    mem_mb: 16000
    runtime: "1h"
  txsscan:
    mem_mb: 1000
    runtime: "30m"
  ectyper:
    mem_mb: 5000
    runtime: "2h"
  seqsero:
    mem_mb: 1000
    runtime: "30m"
  sistr:
    mem_mb: 4000
    runtime: "2h"
  mlst:
    mem_mb: 1000
    runtime: "1h"
