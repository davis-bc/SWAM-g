# config/slurm/config.yaml
#
# NOTE: Two purpose-built profiles are now available and preferred:
#   config/slurm/large-batch/  — use for ≥50 samples (groups of 32)
#   config/slurm/small-batch/  — use for <50 samples (individual jobs)
#
# This file is retained as a general-purpose fallback. All resource tuning
# should be done in the profile configs above, not in the rule .smk files.

# ----------------------------
#  Set global slurm limits
# ----------------------------

executor: slurm

jobs: 100                       # Max number of simultaneous jobs submitted to slurm (account max)
cores: 1024                     # Max number of CPUs across all jobs (account max)
conda-frontend: conda           # conda or mamba 
use-conda: True                 # Enable Conda integration
keep-incomplete: True           # Keep incomplete output to prevent re-computation


# ----------------------------------------------------
#   Set default resources (if not specified in rules)
# ----------------------------------------------------

default-resources:
  slurm_account: "nrsaamr"
  slurm_partition: "'ord'"
  mem_mb: 10000               
  runtime: 8640
 
# -----------------------------------------------------------
#  Assign rules: "groups" (run samples in batches)
# -----------------------------------------------------------

groups:
  mobsuite: "mobsuite"
  amrfinderplus: "amrfinderplus"
  resfinder: "resfinder"
  mef: "mobilelementfinder"
  ectyper: "ectyper"
  seqsero: "seqsero"
  txsscan: "txsscan"
  coverage: "coverage"
  checkm2: "checkm2"

# --------------------------------------------------------------------------------------------------
#  Set the number of connected DAG components a group can span (sample batch size of each group)
#  The mem and threads for each group is summed!!!
#  32 samples to be run in parallel each requesting 1 thread (cpu) = 32 cpus requested in group job
# --------------------------------------------------------------------------------------------------

group-components:
  mobsuite: 32 
  amrfinderplus: 32
  resfinder: 32
  ectyper: 32
  mobilelementfinder: 32
  seqsero: 32
  txsscan: 32
  coverage: 32
  checkm2: 32

# -----------------------------------------------------------
#  Per-rule thread allocation (same as large-batch profile)
# -----------------------------------------------------------

set-threads:
  fastp: 1
  unicylcer: 32
  coverage: 1
  mash_classify: 4
  mobsuite: 1
  amrfinderplus: 1
  resfinder: 1
  mef: 1
  checkm2: 1
  txsscan: 1
  ectyper: 1
  seqsero: 1
  mlst: 1

# -----------------------------------------------------------
#  Per-rule resource allocation (same as large-batch profile)
# -----------------------------------------------------------

set-resources:
  fastp:
    mem_mb: 10000
    runtime: 60
  unicylcer:
    mem_mb: 150000
    runtime: 8640
  coverage:
    mem_mb: 4000
    runtime: 60
  mash_classify:
    mem_mb: 20000
    runtime: 60
  mobsuite:
    mem_mb: 2000
    runtime: 600
  amrfinderplus:
    mem_mb: 2000
    runtime: 600
  resfinder:
    mem_mb: 4000
    runtime: 600
  mef:
    mem_mb: 2000
    runtime: 600
  checkm2:
    mem_mb: 4000
    runtime: 720
  txsscan:
    mem_mb: 2000
    runtime: 600
  ectyper:
    mem_mb: 5000
    runtime: 600
  seqsero:
    mem_mb: 2000
    runtime: 120
  mlst:
    mem_mb: 4000
    runtime: 120
