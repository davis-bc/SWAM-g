# config/local/config.yaml
# Local workstation profile (8 cores, 32 GB RAM)

executor: local
cores: 8
scheduler: greedy
use-conda: true
conda-frontend: conda
keep-incomplete: true

# ------------------------------------------------------------------
#  Analysis modules
#  Mandatory core stages always run: fastp, unicycler, MASH taxonomy,
#  and AMRFinderPlus. Toggle the optional analyses below as needed.
# ------------------------------------------------------------------
config:
  run_coverage: true
  run_checkm2: true
  run_mlst: true
  run_txsscan: true
  run_mef: true
  run_mashtree: true
  run_resfinder: true
  run_salmonella_serotyping: true
  run_ecoli_pathotyping: true
  pd_lookup: true
  pd_backend: ftp
  pd_comparator_limit: 10
  pd_sample_metadata_tsv: ""
  pd_isolates_tsv: ""
  pd_exceptions_tsv: ""

# ------------------------------------------------------------------
#  Global resource pool — Snakemake schedules jobs so the running
#  total never exceeds these values.
#  mem_mb = 30000 (~30 GB) leaves ~2 GB headroom for the OS.
#  With mash declared at 20000 MB below, only ONE mash
#  screen job runs at a time, preventing the OOM seen on HPC.
# ------------------------------------------------------------------
resources:
  mem_mb: 30000

default-resources:
  mem_mb: 4000

# ------------------------------------------------------------------
#  Thread overrides — unicycler requests 32 threads by
#  default; cap it at the number of physical cores available.
# ------------------------------------------------------------------
set-threads:
  fastp: 1
  unicycler: 8
  coverage: 1
  mash: 4
  mobsuite: 1
  amrfinder: 1
  resfinder: 1
  mobileelementfinder: 1
  checkm2: 1
  txsscan: 1
  ectyper: 1
  seqsero2: 4
  sistr: 4
  mlst: 1

# ------------------------------------------------------------------
#  Resource overrides — raise mash memory reservation so
#  the scheduler serialises it against the 30 GB global pool.
# ------------------------------------------------------------------
set-resources:
  fastp:
    mem_mb: 10000
  unicycler:
    mem_mb: 20000
  coverage:
    mem_mb: 4000
  mash:
    mem_mb: 20000
  mobsuite:
    mem_mb: 4000
  amrfinder:
    mem_mb: 2000
  resfinder:
    mem_mb: 4000
  mobileelementfinder:
    mem_mb: 2000
  checkm2:
    mem_mb: 4000
  txsscan:
    mem_mb: 2000
  ectyper:
    mem_mb: 4000
  seqsero2:
    mem_mb: 4000
  sistr:
    mem_mb: 4000
  mlst:
    mem_mb: 4000
